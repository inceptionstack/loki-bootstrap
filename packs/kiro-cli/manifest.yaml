name: kiro-cli
version: "2.0.0"
type: agent
description: "Kiro CLI v2 — AWS agentic IDE terminal client with MCP server support (experimental)"

deps: []

requirements:
  arch:
    - arm64
    - amd64
  os:
    - al2023
    - ubuntu2204
  min_instance_type: t4g.medium

params:
  - name: region
    description: "AWS region (informational; Kiro CLI uses its own cloud inference)"
    default: us-east-1
  - name: kiro-api-key
    description: "Kiro API key for headless mode (v2+). Skips browser login. Get one at https://app.kiro.dev. Prefer --from-secret for production."
    default: ""
  - name: from-secret
    description: "AWS Secrets Manager secret id/arn whose value is the Kiro API key (alternative to --kiro-api-key)"
    default: ""

health_check:
  command: "kiro-cli --version"
  timeout: 10

provides:
  commands:
    - kiro-cli
  services: []

instance_type: t4g.medium
root_volume_gb: 40
data_volume_gb: 0

experimental: true
