schema_version: 1
id: kiro-cli
display_name: Kiro CLI
description: AWS agentic IDE terminal client with MCP server support.
experimental: true
allowed_profiles:
  - builder
  - account_assistant
supported_methods:
  - cfn
  - terraform
default_profile: builder
default_method: terraform
default_region: us-east-1
post_install:
  - ssm_session
required_env: []
extra_options_schema:
  region:
    value_type: string
    required: false
    default_value: us-east-1
    description: Informational region hint for Kiro CLI.
