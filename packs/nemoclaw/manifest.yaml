schema_version: 1
id: nemoclaw
display_name: NemoClaw
description: OpenClaw in a sandboxed OpenShell environment for personal assistant workflows.
experimental: true
allowed_profiles:
  - personal_assistant
supported_methods:
  - cfn
  - terraform
default_profile: personal_assistant
default_method: cfn
default_region: us-east-1
post_install:
  - ssm_session
  - pairing
required_env: []
extra_options_schema:
  sandbox_name:
    value_type: string
    required: false
    default_value: loki-assistant
    description: NemoClaw sandbox name.
