name: ironclaw
version: "1.1.0"
type: agent
description: "IronClaw — Rust-based AI agent by NEAR AI (experimental)"

deps: []

requirements:
  arch:
    - arm64
    - amd64
  os:
    - al2023
    - ubuntu2204
  min_instance_type: t4g.medium

params:
  - name: region
    description: "AWS region for Bedrock"
    default: us-east-1
  - name: model
    description: "Model ID for LLM_MODEL env var (native Bedrock)"
    default: "us.anthropic.claude-sonnet-4-6-v1"

health_check:
  command: "ironclaw --version"
  timeout: 10

provides:
  commands:
    - ironclaw
  services: []
