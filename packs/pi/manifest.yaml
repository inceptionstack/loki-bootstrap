schema_version: 1
id: pi
display_name: Pi
description: Minimal terminal coding harness.
experimental: true
allowed_profiles:
  - builder
  - account_assistant
supported_methods:
  - cfn
  - terraform
default_profile: builder
default_method: terraform
default_region: us-east-1
post_install:
  - ssm_session
required_env: []
extra_options_schema:
  model:
    value_type: string
    required: false
    default_value: us.anthropic.claude-sonnet-4-6-v1
    description: Model identifier passed to Pi.
  bedrockify_port:
    value_type: integer
    required: false
    default_value: "8090"
    description: bedrockify port for Pi.
