schema_version: 1
id: openclaw
display_name: OpenClaw
description: Default Loki Agent workstation deployment with gateway support.
experimental: false
allowed_profiles:
  - builder
  - account_assistant
supported_methods:
  - cfn
  - terraform
default_profile: builder
default_method: cfn
default_region: us-east-1
post_install:
  - ssm_session
  - pairing
required_env: []
extra_options_schema:
  model:
    value_type: string
    required: false
    default_value: us.anthropic.claude-opus-4-6-v1
    description: Default model identifier for the gateway.
  port:
    value_type: integer
    required: false
    default_value: "3001"
    description: Gateway listener port.
