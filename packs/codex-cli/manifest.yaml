name: codex-cli
version: "1.0.0"
type: agent
description: "Codex CLI — OpenAI's coding agent (requires OpenAI API key)"

deps: []

requirements:
  arch:
    - arm64
    - amd64
  os:
    - al2023
    - ubuntu2204
  min_instance_type: t4g.medium

params:
  - name: region
    description: "AWS region (informational — Codex CLI uses OpenAI's API)"
    default: us-east-1
  - name: model
    description: "Default model for Codex CLI"
    default: "gpt-5.4"
  - name: openai-api-key
    description: "OpenAI API key (required — get from platform.openai.com/api-keys)"
    required: true
  - name: sandbox
    description: "Default sandbox mode: workspace-write or workspace-read"
    default: "workspace-write"

health_check:
  command: "codex --version"
  timeout: 10

provides:
  commands:
    - codex
  services: []

instance_type: t4g.medium
root_volume_gb: 40
data_volume_gb: 0

experimental: true
