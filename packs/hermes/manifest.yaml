schema_version: 1
id: hermes
display_name: Hermes
description: NousResearch Hermes CLI agent via bedrockify.
experimental: false
allowed_profiles:
  - builder
  - account_assistant
supported_methods:
  - cfn
  - terraform
default_profile: builder
default_method: terraform
default_region: us-east-1
post_install:
  - ssm_session
required_env: []
extra_options_schema:
  hermes_model:
    value_type: string
    required: false
    default_value: anthropic/claude-opus-4.6
    description: OpenAI-style model identifier passed through bedrockify.
  bedrockify_port:
    value_type: integer
    required: false
    default_value: "8090"
    description: bedrockify port for Hermes.
