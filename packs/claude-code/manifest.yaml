schema_version: 1
id: claude-code
display_name: Claude Code
description: Anthropic coding agent with native Bedrock support.
experimental: false
allowed_profiles:
  - builder
  - account_assistant
supported_methods:
  - cfn
  - terraform
default_profile: builder
default_method: cfn
default_region: us-east-1
post_install:
  - ssm_session
required_env: []
extra_options_schema:
  model:
    value_type: string
    required: false
    default_value: us.anthropic.claude-sonnet-4-6
    description: Bedrock model for Claude Code.
  haiku_model:
    value_type: string
    required: false
    default_value: us.anthropic.claude-haiku-4-5-20251001-v1:0
    description: Fast-path Haiku model for Claude Code.
