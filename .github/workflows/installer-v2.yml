name: Installer V2

on:
  push:
    branches: [main, v2-cli]
    tags: ['v*']
    paths:
      - 'tools/loki-installer/**'
      - '.github/workflows/installer-v2.yml'
  pull_request:
    branches: [main, v2-cli]
    paths:
      - 'tools/loki-installer/**'
      - '.github/workflows/installer-v2.yml'

permissions:
  contents: write

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo check
        run: cargo check --manifest-path tools/loki-installer/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path tools/loki-installer/Cargo.toml

      - name: Cargo clippy
        run: cargo clippy --manifest-path tools/loki-installer/Cargo.toml -- -D warnings

  build-release:
    needs: check-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_os: linux
            artifact_arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: loki-installer-linux-amd64
            strip_command: strip
          - artifact_os: linux
            artifact_arch: arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: loki-installer-linux-arm64
            strip_command: aarch64-linux-gnu-strip
          - artifact_os: darwin
            artifact_arch: amd64
            runner: macos-latest
            target: x86_64-apple-darwin
            binary_name: loki-installer-darwin-amd64
            strip_command: strip
          - artifact_os: darwin
            artifact_arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            binary_name: loki-installer-darwin-arm64
            strip_command: strip
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux amd64 musl tooling
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Linux arm64 packaging tooling
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Install cross for Linux arm64 musl
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            cross build --release --target "${{ matrix.target }}" --manifest-path tools/loki-installer/Cargo.toml
          else
            cargo build --release --target "${{ matrix.target }}" --manifest-path tools/loki-installer/Cargo.toml
          fi
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.target == 'x86_64-unknown-linux-musl' && 'musl-gcc' || '' }}

      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p dist
          BIN_PATH="tools/loki-installer/target/${{ matrix.target }}/release/loki-installer"
          OUT_PATH="dist/${{ matrix.binary_name }}"
          cp "$BIN_PATH" "$OUT_PATH"
          "${{ matrix.strip_command }}" "$OUT_PATH"
          shasum -a 256 "$OUT_PATH" > "${OUT_PATH}.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: |
            dist/${{ matrix.binary_name }}
            dist/${{ matrix.binary_name }}.sha256

  release:
    needs: build-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
